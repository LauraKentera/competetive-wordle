# Local development infrastructure only (not used by Railway production deployment).
services:
  mysql:
    image: mysql:8.4
    container_name: competitive-wordle-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordle
    ports:
      - "3309:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    container_name: competitive-wordle-redis
    restart: unless-stopped
    command: redis-server --requirepass devredispass
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data: