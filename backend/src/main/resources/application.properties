spring.application.name=backend
server.port=8080

# Active dev profile for teamwork
spring.profiles.active=dev

# Activate line below when going into prod
# SPRING_PROFILES_ACTIVE=prod

spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_32+_CHARS
app.jwt.issuer=competitive-wordle
app.jwt.expiration-seconds=3600

# Redis (game chat cache). Override via SPRING_DATA_REDIS_HOST / PORT in production.
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}