spring.application.name=backend
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Comma-separated list of allowed browser origins for both HTTP CORS and SockJS/WebSocket.
# Set this in Railway to your frontend public URL, e.g. https://your-frontend.up.railway.app
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Never expose stack traces, exception class names, or binding errors in error responses
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-exception=false
server.error.include-binding-errors=never
server.server-header=

# JWT
app.jwt.secret=${APP_JWT_SECRET:}
app.jwt.issuer=competitive-wordle
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION_SECONDS:28800}

# Redis (game chat cache). Override via SPRING_DATA_REDIS_HOST / PORT in production.
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}