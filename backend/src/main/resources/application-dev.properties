spring.application.name=backend
server.port=8080

spring.datasource.url=jdbc:mysql://127.0.0.1:3307/wordle?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=dev-only-local-secret-never-use-in-production-abcdef1234567890!!
app.jwt.issuer=competitive-wordle
app.jwt.expiration-seconds=28800

# Redis (game chat cache). Start Redis locally or set host/port for remote.
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=devredispass