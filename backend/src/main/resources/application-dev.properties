spring.application.name=backend
server.port=8080

spring.datasource.url=jdbc:mysql://127.0.0.1:3307/wordle?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_32+_CHARS
app.jwt.issuer=competitive-wordle
app.jwt.expiration-seconds=3600

# Redis (game chat cache). Start Redis locally or set host/port for remote.
spring.data.redis.host=localhost
spring.data.redis.port=6379