# Use H2 for tests (no docker required)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable SQL init scripts if you have any MySQL init scripts
spring.sql.init.mode=never

# JWT for tests (just needs to exist)
app.jwt.secret=TEST_SECRET_TEST_SECRET_TEST_SECRET_32_CHARS
app.jwt.issuer=competitive-wordle
app.jwt.expiration-seconds=3600